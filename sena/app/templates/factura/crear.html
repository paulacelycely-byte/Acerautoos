{% extends 'body.html' %}

{% block contenido %}
<div class="container mt-4">
    <h2>Crear Factura</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="{% url 'app:listar_facturas' %}" class="btn btn-danger">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
