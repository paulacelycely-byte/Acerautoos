{% extends "body.html" %}
{% block contenido %}
<h2>
    {% if form.instance.pk %}
        ✏️ Editar Producto
    {% else %}
        ➕ Agregar Producto
    {% endif %}
</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Guardar</button>
</form>

<a href="{% url 'app:detalle_orden_list' %}" style="display:inline-block; margin-top:10px;">⬅ Volver a lista</a>
{% endblock %}
